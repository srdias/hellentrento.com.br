name: Production Deployment (VPS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          MISSING_SECRETS=()
          [ -z "${{ secrets.DEPLOY_SSH_HOST }}" ] && MISSING_SECRETS+=("DEPLOY_SSH_HOST")
          [ -z "${{ secrets.DEPLOY_SSH_USER }}" ] && MISSING_SECRETS+=("DEPLOY_SSH_USER")
          [ -z "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ] && MISSING_SECRETS+=("DEPLOY_SSH_PRIVATE_KEY")
          
          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "::error::Missing mandatory secrets: ${MISSING_SECRETS[*]}"
            exit 1
          fi

      - name: Setup Node (optional but good for consistency)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Deploy Script
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_ENV_BASE64: ${{ secrets.DEPLOY_ENV_BASE64 }}
        run: ./scripts/vps-deploy.sh
